services:
  newsnow:
    build: .
    ports:
      - '4444:4444'
    volumes:
      - newsnow_data:/usr/app/.data
    environment:
      - G_CLIENT_ID=
      - G_CLIENT_SECRET=
      - JWT_SECRET=
      - INIT_TABLE=true
      - ENABLE_CACHE=true
      - PRODUCTHUNT_API_TOKEN=
      - TRANSLATE_PROVIDER=deepseek
      - DEEPSEEK_API_KEY=
      - DEEPSEEK_MODEL=deepseek-v4-flash
      - TRANSLATE_TARGET=zh-Hans
      - TRANSLATE_BATCH_SIZE=30

volumes:
  newsnow_data:
    name: newsnow_data
